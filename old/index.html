<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hannimman.github.io/QuoteMaker/" />
    <meta property="og:image" content="https://hannimman.github.io/QuoteMaker/pikapika.jpg" />
    <meta property="og:description" content="피카츄가 들판을 뛰어다닙니다" />
    <meta property="og:site_name" content="따옴표 마법사" />
    <meta property="og:locale" content="ko_KR" />
    <title>QuoteMaker</title>
    <link href="tailwind.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <main class="container">
        <!-- 피카츄가 뛰노는 캔버스 -->
        <section class="pikaCanva">
            <canvas id="canvas"></canvas>
        </section>

        <!-- INPUT -->
        <section class="card item1">
            <div class="input-head">
                <h1 class="text-xl font-semibold text-gray-700">INPUT</h1>
                <span class="controls text-sm text-gray-600">
                    <label><input type="radio" id="enter" name="group" value="엔터" checked> 엔터</label>
                    <label><input type="radio" id="comma" name="group" value="콤마"> 콤마</label>
                </span>
                <button id="resetButton" class="bg-red-500 hover:bg-red-600 text-white font-semibold py-1 px-3 rounded-md text-xs shadow-sm transition-colors">리셋</button>
                <label id="lblPika"></label>
            </div>
            <textarea name="taOrigin" id="taOrigin" rows="9"></textarea>
        </section>

        <!-- OUTPUT / CUSTOM -->
        <section class="itemContainer">
            <div class="card item2">
                <h2 class="text-xl font-semibold text-gray-700 flex items-baseline">
                    OUTPUT
                    <span id="pCount" class="text-sm text-purple-600 font-semibold ml-2"></span>
                </h2>
                <div class="controls text-sm text-gray-600">
                    <label><input type="checkbox" id="commaCheck" name="commaCheck" checked> Comma</label>
                    <label><input type="radio" id="singleQuote" name="quoteGroup" checked> Single</label>
                    <label><input type="radio" id="doubleQuote" name="quoteGroup"> Double</label>
                    <label><input type="radio" id="noneQuote" name="quoteGroup"> None</label>
                </div>
                <button id="copyOutputButton" class="action-btn bg-blue-500 hover:bg-blue-600 text-white font-semibold py-1 px-3 rounded-md text-xs shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75">
                    Copy
                </button>
                <div class="textarea-wrapper">
                    <textarea name="taNew" id="taNew" rows="10"></textarea>
                </div>
            </div>

            <div class="card item3">
                <h2 class="text-xl font-semibold text-gray-700">CUSTOM</h2>
                <div class="controls text-sm text-gray-600">
                    <label><input type="radio" id="username" name="group2" value="대문자" checked> Upper case</label>
                    <label><input type="radio" id="userid" name="group2" value="소문자"> Lower case</label>
                </div>
                <button id="copyCustomButton" class="action-btn bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-1 px-3 rounded-md text-xs shadow-sm transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-opacity-75">
                    Copy
                </button>
                <div class="textarea-wrapper">
                    <textarea name="taCus" id="taCus" rows="10"></textarea>
                </div>
            </div>
        </section>
    </main>

    <script src="js/quote.js"></script>
    <script src="js/pikachu.js"></script>
</body>
</html>
